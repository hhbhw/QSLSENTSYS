version: '3.8'

services:
  postgresql:
    image: postgres:15-alpine
    container_name: qsl-postgresql
    environment:
      POSTGRES_USER: qsl_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ChangeMeInProduction}
      POSTGRES_DB: qsl_db
    volumes:
      - qsl_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qsl_admin -d qsl_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qsl_network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: qsl-backend
    environment:
      - APP_NAME=QSL Card Tracker API
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=postgresql://qsl_admin:${DB_PASSWORD:-ChangeMeInProduction}@postgresql:5432/qsl_db
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-ChangeMeInProduction}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173}
    depends_on:
      postgresql:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ../backend/app:/app/app
    networks:
      - qsl_network
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: qsl-frontend
    environment:
      - VITE_API_BASE=${API_BASE:-http://localhost:8000/api/v1}
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - qsl_network
    restart: unless-stopped

volumes:
  qsl_data:

networks:
  qsl_network:
    driver: bridge
